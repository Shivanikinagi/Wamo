version: '3.8'
services:
  redpanda:
    image: redpandadata/redpanda:latest
    container_name: ps01-redpanda
    command:
      - redpanda
      - start
      - --smp 1
      - --memory 512M
      - --reserve-memory 0M
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:29092,OUTSIDE://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:29092,OUTSIDE://localhost:9092
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - /home/parth/ccode/wam0/redpanda-data:/var/lib/redpanda/data
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ps01-redis
    ports:
      - "6380:6379"
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - /home/parth/ccode/wam0/redis-data:/data
    restart: unless-stopped
